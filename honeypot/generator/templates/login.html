{% extends "base.html" %}
{% block title %}Login · {{ persona.name }}{% endblock %}
{% block content %}
<div class="card" style="max-width:420px; margin:32px auto;">
  <h1>Sign in</h1>
  {% if error %}<p style="color:#c0392b">{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <p><label>Username<br><input name="username" required style="width:100%"></label></p>
    <p><label>Password<br><input name="password" type="password" required style="width:100%"></label></p>
    <p><button type="submit">Sign in</button></p>
  </form>
  <p style="color:#6b7785; font-size:13px;">
    Need API access? See our internal <a href="/api/docs">Swagger</a> reference.
  </p>
  <!-- legacy: deploy account still defined in /backup/db_backup_2026-04.tar.gz -->
</div>
{% endblock %}
