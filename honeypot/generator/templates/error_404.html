{% extends "base.html" %}
{% block title %}404 · {{ persona.name }}{% endblock %}
{% block content %}
<div class="card">
  <h1>404 Not Found</h1>
  <p>The requested URL <code>{{ path }}</code> was not found on this server.</p>
  <hr>
  <p style="color:#6b7785; font-size:13px">{{ persona.server_header }} Server at {{ host }} Port 80</p>
</div>
{% endblock %}
